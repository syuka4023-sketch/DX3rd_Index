<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>DX3rd エフェクト・アイテム・Dロイス辞典</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;font-family:system-ui,sans-serif;background:#f4f4f6;color:#222}
header{background:#20243a;color:white;padding:16px;text-align:center}
main{max-width:1150px;margin:auto;padding:16px}
.tabs{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.tabs button,.btn{padding:10px 12px;border:0;border-radius:10px;background:#ddd;font-weight:bold;cursor:pointer}
.tabs button.active,.btn.main{background:#20243a;color:white}
.btn.danger{background:#b83232;color:white}.btn.warn{background:#d89521;color:white}.btn.small{padding:7px 9px;font-size:13px}
.controls,.dropzone,.detail,.editor{background:white;padding:14px;border-radius:14px;margin-bottom:14px;box-shadow:0 2px 8px #0001}
.controls{display:grid;gap:10px}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.row>*{min-width:140px}
input,select,textarea{padding:10px;border:1px solid #ccc;border-radius:8px;font-size:15px;box-sizing:border-box;width:100%}
textarea{min-height:86px;resize:vertical}.dropzone{text-align:center;border:2px dashed #aaa;color:#666}.dropzone.drag{background:#eef0ff;border-color:#20243a}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:12px}.card{background:white;padding:14px;border-radius:14px;box-shadow:0 2px 8px #0001}.card h3{margin:0 0 8px;cursor:pointer}.card h3:hover{text-decoration:underline}
.tag{display:inline-block;background:#e7e9f8;color:#20243a;padding:4px 8px;border-radius:999px;font-size:12px;margin:2px}.userTag{display:inline-block;background:#ffe9c7;color:#7a4300;padding:4px 8px;border-radius:999px;font-size:12px;margin:2px}.detail,.editor{display:none}.detail.show,.editor.show{display:block}.small{font-size:13px;color:#666}.status{font-size:14px;color:#20243a;font-weight:bold}.empty{text-align:center;color:#777;padding:30px}.formGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}.full{grid-column:1/-1}.count{font-weight:bold;color:#20243a}.cardActions{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}.hidden{display:none!important}
</style>
</head>
<body>
<header><h1>DX3rd エフェクト・アイテム・Dロイス辞典</h1></header>
<main>
  <div class="tabs">
    <button id="effectTab" class="active">エフェクト一覧</button>
    <button id="itemTab">アイテム一覧</button>
    <button id="dloisTab">Dロイス一覧</button>
    <button id="fileTab">ファイル管理</button>
  </div>

  <section id="dataControls" class="controls">
    <input id="searchInput" type="text" placeholder="名前・効果・解説・出典で検索（例：火力 -イージーエフェクト）">
    <div class="row">
      <select id="filter1"></select>
      <select id="filter2"></select>
      <select id="sortSelect">
        <option value="nameAsc">名前 昇順</option>
        <option value="nameDesc">名前 降順</option>
        <option value="sourceAsc">出典 昇順</option>
        <option value="sourceDesc">出典 降順</option>
        <option value="skillAsc">技能 昇順</option>
        <option value="skillDesc">技能 降順</option>
        
      </select>
    </div>
    <div id="tagFilterBox" class="small"></div>
    <div class="row" id="expFilterRow">
      <input id="expMinInput" type="number" placeholder="経験点 以上" oninput="renderList()">
      <input id="expMaxInput" type="number" placeholder="経験点 以下" oninput="renderList()">
    </div>
    <div class="row">
        <button class="btn main" onclick="openNewEditor()">新規追加</button>
    </div>
    <div><span id="countText" class="count"></span></div>
    <div id="csvStatus" class="status"></div>
  </section>

  <section id="filePanel" class="controls hidden">
  <h2>ファイル管理</h2>

  <input type="file" id="csvFile" accept=".csv,text/csv">

  <div class="row">
    <button class="btn main" onclick="loadCSVFromInput()">CSV読み込み</button>
    <button class="btn" onclick="downloadTemplate('effect')">エフェクトCSV</button>
    <button class="btn" onclick="downloadTemplate('item')">アイテムCSV</button>
    <button class="btn" onclick="downloadTemplate('dlois')">DロイスCSV</button>
    <button class="btn warn" onclick="removeDuplicates()">重複削除</button>
  </div>

  <p class="small">
    CSV読み込み、テンプレートDL、ドラッグ＆ドロップ読み込みをここで管理します。
  </p>
</section>
  <section id="dropzone" class="dropzone">CSVファイルをここにドラッグ＆ドロップ<br><span class="small">Live Server / localhost で開いてください</span></section>
  <section id="editor" class="editor"></section>
  <section id="detail" class="detail"></section>
  <section id="list" class="grid"></section>
</main>

<script>
const DB_NAME = "dx3rd_dictionary_db";
const DB_VERSION = 10;
let db, mode = "effect";
let effects = [], items = [], dloisList = [];
let editingOldName = null;
let selectedFilterTags = [];
let excludedFilterTags = [];

const defaultEffects = [{name:"コンセントレイト：エンジェルハイロゥ",syndrome:"エンジェルハイロゥ",timing:"メジャー",skill:"シンドローム",level:"1〜3",cost:"2",effect:"C値を-Lvする。下限値7。",description:"多くの攻撃ビルドで使われる基本的なクリティカル値低下エフェクト。",source:"基本ルールブック",tags:"通常エフェクト"}];
const defaultItems = [{name:"日本刀",category:"武器",type:"白兵",purchase:"11",stock:"5",effect:"攻撃力+5、ガード値3。",description:"初期作成でも扱いやすい白兵武器。",source:"基本ルールブック"}];
const defaultDlois = [{name:"実験体",type:"一般",timing:"常時",limit:"なし",effect:"能力値を合計+4する。",description:"能力値を底上げできる汎用性の高いDロイス。",source:"基本ルールブック"}];

const $ = id => document.getElementById(id);
const effectTab=$("effectTab"), itemTab=$("itemTab"), dloisTab=$("dloisTab"), fileTab=$("fileTab"), searchInput=$("searchInput"), filter1=$("filter1"), filter2=$("filter2"), sortSelect=$("sortSelect"), list=$("list"), detail=$("detail"), editor=$("editor"), csvStatus=$("csvStatus"), dropzone=$("dropzone"), countText=$("countText");

effectTab.onclick=()=>switchMode("effect");
itemTab.onclick=()=>switchMode("item");
dloisTab.onclick=()=>switchMode("dlois");
fileTab.onclick=()=>switchMode("file");
searchInput.oninput=renderList; filter1.onchange=renderList; filter2.onchange=renderList; sortSelect.onchange=renderList;

function storeName(){return mode==="effect"?"effects":mode==="item"?"items":"dlois"}
function getCurrentData(){return mode==="effect"?effects:mode==="item"?items:dloisList}
function setCurrentData(arr){if(mode==="effect")effects=arr;else if(mode==="item")items=arr;else dloisList=arr}

function switchMode(next){
  mode=next;
  editingOldName=null;

  editor.classList.remove("show");
  detail.classList.remove("show");

  effectTab.classList.toggle("active",mode==="effect");
  itemTab.classList.toggle("active",mode==="item");
  dloisTab.classList.toggle("active",mode==="dlois");
  fileTab.classList.toggle("active",mode==="file");

  const isFile = mode==="file";

  $("dataControls").classList.toggle("hidden", isFile);
  $("filePanel").classList.toggle("hidden", !isFile);
  $("dropzone").classList.toggle("hidden", !isFile);
  $("list").classList.toggle("hidden", isFile);

  if(isFile) return;

  updateExpFilterVisibility();
  setupFilters();
  renderList();
}
function openDB(){return new Promise((resolve,reject)=>{const req=indexedDB.open(DB_NAME,DB_VERSION);req.onupgradeneeded=e=>{const database=e.target.result;["effects","items","dlois"].forEach(s=>{if(!database.objectStoreNames.contains(s)) database.createObjectStore(s,{keyPath:"name"})})};req.onsuccess=e=>{db=e.target.result;resolve(db)};req.onerror=()=>reject(req.error)})}
async function ensureDB(){if(!db) await openDB(); return db}
async function getAll(s){await ensureDB();return new Promise((resolve,reject)=>{const tx=db.transaction(s,"readonly");const req=tx.objectStore(s).getAll();req.onsuccess=()=>resolve(req.result||[]);req.onerror=()=>reject(req.error)})}
async function putMany(s,arr){if(!arr||arr.length===0)return;await ensureDB();return new Promise((resolve,reject)=>{const tx=db.transaction(s,"readwrite");const store=tx.objectStore(s);arr.forEach(o=>store.put(o));tx.oncomplete=resolve;tx.onerror=()=>reject(tx.error)})}
async function putOne(s,obj){return putMany(s,[obj])}
async function deleteOne(s,name){await ensureDB();return new Promise((resolve,reject)=>{const tx=db.transaction(s,"readwrite");tx.objectStore(s).delete(name);tx.oncomplete=resolve;tx.onerror=()=>reject(tx.error)})}
async function clearStore(s){await ensureDB();return new Promise((resolve,reject)=>{const tx=db.transaction(s,"readwrite");tx.objectStore(s).clear();tx.oncomplete=resolve;tx.onerror=()=>reject(tx.error)})}

async function init(){try{await openDB();effects=await getAll("effects");items=await getAll("items");dloisList=await getAll("dlois");if(!effects.length){effects=defaultEffects;await putMany("effects",effects)}if(!items.length){items=defaultItems;await putMany("items",items)}if(!dloisList.length){dloisList=defaultDlois;await putMany("dlois",dloisList)}setupFilters();renderList()}catch(err){csvStatus.textContent="初期化失敗："+(err.message||err)}}

function setupFilters(){detail.classList.remove("show");updateExpFilterVisibility();filter1.innerHTML=`<option value="">すべて</option>`;filter2.innerHTML=`<option value="">すべて</option>`;if(mode==="effect"){filter1.dataset.key="syndrome";filter2.dataset.key="timing";filter1.firstElementChild.textContent="シンドロームすべて";filter2.firstElementChild.textContent="タイミングすべて";addOptions(filter1,unique(effects.map(e=>e.syndrome)));addOptions(filter2,unique(effects.map(e=>e.timing)))}if(mode==="item"){filter1.dataset.key="category";filter2.dataset.key="type";filter1.firstElementChild.textContent="種別すべて";filter2.firstElementChild.textContent="タイプすべて";addOptions(filter1,unique(items.map(i=>i.category)));addOptions(filter2,unique(items.map(i=>i.type)))}if(mode==="dlois"){filter1.dataset.key="type";filter2.dataset.key="limit";filter1.firstElementChild.textContent="分類すべて";filter2.firstElementChild.textContent="制限すべて";addOptions(filter1,unique(dloisList.map(d=>d.type)));addOptions(filter2,unique(dloisList.map(d=>d.limit)))}renderTagFilterBox()}
function unique(arr){return [...new Set(arr.filter(Boolean))].sort((a,b)=>String(a).localeCompare(String(b),"ja"))}
function addOptions(select,values){values.forEach(v=>{const opt=document.createElement("option");opt.value=v;opt.textContent=v;select.appendChild(opt)})}

function filteredSortedData(){const data=getCurrentData();const parsed=parseSearchQuery(searchInput.value.trim());const q=parsed.normal.toLowerCase();const f1=filter1.value,f2=filter2.value,k1=filter1.dataset.key,k2=filter2.dataset.key;const selectedTags=getSelectedTagFilters();const excludedTags = getExcludedTagFilters();const expMinValue=mode==="item"?(document.getElementById("expMinInput")?.value||""):"";const expMaxValue=mode==="item"?(document.getElementById("expMaxInput")?.value||""):"";const expMin=Number(expMinValue);const expMax=Number(expMaxValue);let result=data.filter(d=>{const text=Object.values(d).join(" ").toLowerCase();const itemTags=normalizeTags(d.tags).split(",").filter(Boolean);const tagOK=selectedTags.every(t=>itemTags.includes(t));const minusTagOK=excludedTags.every(t=>!itemTags.includes(t));const expNum=parseNumber(d.exp);const expMinOK=mode!=="item"||!expMinValue||(!isNaN(expNum)&&expNum>=expMin);const expMaxOK=mode!=="item"||!expMaxValue||(!isNaN(expNum)&&expNum<=expMax);return(!q||text.includes(q))&&(!f1||d[k1]===f1)&&(!f2||d[k2]===f2)&&tagOK&&minusTagOK&&expMinOK&&expMaxOK});const sort=sortSelect.value;result.sort((a,b)=>{let key="name";if(sort.startsWith("source"))key="source";if(sort.startsWith("skill"))key="skill";const r=String(a[key]||"").localeCompare(String(b[key]||""),"ja");return sort.endsWith("Desc")?-r:r});return result}
function renderList(){const result=filteredSortedData();list.innerHTML="";countText.textContent=`表示 ${result.length}件 / 全 ${getCurrentData().length}件`;if(!result.length){list.innerHTML=`<div class="empty">該当データがありません</div>`;return}result.forEach(d=>{const card=document.createElement("div");card.className="card";if(mode==="effect")card.innerHTML=`<h3 onclick="renderDetailByName('${escapeJS(d.name)}')">${escapeHTML(d.name)}</h3><span class="tag">${escapeHTML(d.syndrome)}</span><span class="tag">${escapeHTML(d.timing)}</span><span class="tag">${escapeHTML(d.skill)}</span>${renderUserTags(d.tags)}<p><b>効果：</b><br>${escapeHTML(shortText(d.effect))}</p>`;if(mode==="item")card.innerHTML=`<h3 onclick="renderDetailByName('${escapeJS(d.name)}')">${escapeHTML(d.name)}</h3><span class="tag">${escapeHTML(d.category)}</span><span class="tag">${escapeHTML(d.type)}</span>${renderUserTags(d.tags)}<p>購入：${escapeHTML(d.purchase)}</p><p>常備化：${escapeHTML(d.stock)}</p><p><b>効果：</b><br>${escapeHTML(shortText(d.effect))}</p>`;if(mode==="dlois")card.innerHTML=`<h3 onclick="renderDetailByName('${escapeJS(d.name)}')">${escapeHTML(d.name)}</h3><span class="tag">${escapeHTML(d.type)}</span><span class="tag">${escapeHTML(d.limit)}</span>${renderUserTags(d.tags)}<p>タイミング：${escapeHTML(d.timing)}</p><p><b>効果：</b><br>${escapeHTML(shortText(d.effect))}</p>`;list.appendChild(card)})}

function renderDetailByName(name){const d=getCurrentData().find(x=>x.name===name);if(d)renderDetail(d)}
function renderDetail(d){detail.classList.add("show");editor.classList.remove("show");if(mode==="effect")detail.innerHTML = `
      <h2>${escapeHTML(d.name)}</h2>
      <p><b>最大レベル：</b>${escapeHTML(d.level)}</p>
      <p><b>タイミング：</b>${escapeHTML(d.timing)}</p>
      <p><b>技能：</b>${escapeHTML(d.skill)}</p>
      <p><b>難易度：</b>${escapeHTML(d.difficulty || "-")}</p>
      <p><b>対象：</b>${escapeHTML(d.target || "-")}</p>
      <p><b>射程：</b>${escapeHTML(d.range || "-")}</p>
      <p><b>侵蝕値：</b>${escapeHTML(d.cost)}</p>
      <p><b>制限：</b>${escapeHTML(d.limit || "-")}</p>
      <p><b>効果：</b><br>${escapeHTML(d.effect)}</p>
      <p><b>解説：</b><br>${escapeHTML(d.description || "解説なし")}</p>
      <p><b>タグ：</b><br>${renderUserTags(d.tags) || "タグなし"}</p>
      <button class="btn main" onclick="openEditByName('${escapeJS(d.name)}')">編集</button>
      <button class="btn danger" onclick="deleteByName('${escapeJS(d.name)}')">削除</button>
      <button class="btn" onclick="closeDetail()">閉じる</button>
    `;if(mode==="item")detail.innerHTML=`<h2>${escapeHTML(d.name)}</h2><p><b>分類：</b>${escapeHTML(d.category)}</p><p><b>種別：</b>${escapeHTML(d.type)}</p><p><b>技能：</b>${escapeHTML(d.skill || "-")}</p>${d.skill?`<p><b>命中：</b>${escapeHTML(d.accuracy || "-")}</p><p><b>攻撃力：</b>${escapeHTML(d.attack || "-")}</p><p><b>ガード値：</b>${escapeHTML(d.guard || "-")}</p><p><b>射程：</b>${escapeHTML(d.range || "-")}</p>`:""}${d.type==="ヴィーグル"?`<p><b>行動：</b>${escapeHTML(d.action || "-")}</p><p><b>装甲値：</b>${escapeHTML(d.armor || "-")}</p><p><b>全力疾走：</b>${escapeHTML(d.fullMove || "-")}</p>`:""}<p><b>購入：</b>${escapeHTML(d.purchase)}</p><p><b>常備化：</b>${escapeHTML(d.stock)}</p><p><b>経験点：</b>${escapeHTML(d.exp || "-")}</p><p><b>効果：</b><br>${escapeHTML(d.effect)}</p><p><b>解説：</b><br>${escapeHTML(d.description||"解説なし")}</p><p><b>タグ：</b><br>${renderUserTags(d.tags) || "タグなし"}</p><p><b>出典：</b>${escapeHTML(d.source)}</p>${detailButtons(d.name)}`;if(mode==="dlois")detail.innerHTML=`<h2>${escapeHTML(d.name)}</h2><p><b>分類：</b>${escapeHTML(d.type)}</p><p><b>タイミング：</b>${escapeHTML(d.timing)}</p><p><b>制限：</b>${escapeHTML(d.limit)}</p><p><b>効果：</b><br>${escapeHTML(d.effect)}</p><p><b>解説：</b><br>${escapeHTML(d.description||"解説なし")}</p><p><b>出典：</b>${escapeHTML(d.source)}</p>${detailButtons(d.name)}`;detail.scrollIntoView({behavior:"smooth"})}
function detailButtons(name){return `<button class="btn main" onclick="openEditByName('${escapeJS(name)}')">編集</button> <button class="btn danger" onclick="deleteByName('${escapeJS(name)}')">削除</button> <button class="btn" onclick="closeDetail()">閉じる</button>`}
function closeDetail(){detail.classList.remove("show")}

function openNewEditor(){editingOldName=null;showEditor({})}
function openEditByName(name){const d=getCurrentData().find(x=>x.name===name);if(!d)return;editingOldName=name;showEditor(d)}
function fieldHTML(id,label,value="",area=false){return `<label><b>${label}</b>${area?`<textarea id="${id}">${escapeHTML(value)}</textarea>`:`<input id="${id}" value="${escapeAttr(value)}">`}</label>`}
function showEditor(d){detail.classList.remove("show");editor.classList.add("show");let html=`<h2>${editingOldName?"編集":"新規追加"}</h2><div class="formGrid">`;html+=fieldHTML("f_name","名前",d.name||"");if(mode==="effect"){html+=fieldHTML("f_syndrome","シンドローム",d.syndrome||"")+fieldHTML("f_timing","タイミング",d.timing||"")+fieldHTML("f_skill","技能",d.skill||"")+fieldHTML("f_level","レベル",d.level||"")+fieldHTML("f_cost","侵蝕値",d.cost||"")}if(mode==="item"){html+=fieldHTML("f_category","分類",d.category||"")+fieldHTML("f_type","種別",d.type||"")+fieldHTML("f_skill","技能",d.skill||"")+fieldHTML("f_accuracy","命中",d.accuracy||"")+fieldHTML("f_attack","攻撃力",d.attack||"")+fieldHTML("f_guard","ガード値",d.guard||"")+fieldHTML("f_range","射程",d.range||"")+fieldHTML("f_action","行動（ヴィーグル用）",d.action||"")+fieldHTML("f_armor","装甲値（ヴィーグル用）",d.armor||"")+fieldHTML("f_fullMove","全力疾走（ヴィーグル用）",d.fullMove||"")+fieldHTML("f_purchase","購入",d.purchase||"")+fieldHTML("f_stock","常備化",d.stock||"")+fieldHTML("f_exp","経験点",d.exp||"")}if(mode==="dlois"){html+=fieldHTML("f_type","分類",d.type||"")+fieldHTML("f_timing","タイミング",d.timing||"")+fieldHTML("f_limit","制限",d.limit||"")}html+=`<div class="full">${fieldHTML("f_effect","効果",d.effect||"",true)}</div><div class="full">${fieldHTML("f_description","解説",d.description||"",true)}</div><div class="full"><label><b>任意タグ（カンマ区切り）</b><input id="f_tags" value="${escapeAttr(d.tags||"")}" list="tagSuggestList" placeholder="例：通常エフェクト,イージーエフェクト,火力"><datalist id="tagSuggestList">${tagOptionsHTML()}</datalist></label>${mode==="effect"?`<div class="small">エフェクト種別：<button type="button" class="btn small" onclick="setEffectTypeTag('通常エフェクト')">通常エフェクト</button><button type="button" class="btn small" onclick="setEffectTypeTag('イージーエフェクト')">イージーエフェクト</button></div>`:""}<div class="small">候補タグ：${tagChipsHTML()}</div></div>${fieldHTML("f_source","出典",d.source||"")}</div><br><button class="btn main" onclick="saveEditor()">保存</button> <button class="btn" onclick="closeEditor()">キャンセル</button>`;editor.innerHTML=html;editor.scrollIntoView({behavior:"smooth"})}
function closeEditor(){editingOldName=null;editor.classList.remove("show")}
function val(id){return ($(id)?.value||"").trim()}
async function saveEditor(){const name=val("f_name");if(!name){csvStatus.textContent="名前は必須です";return}let arr=getCurrentData();const exists=arr.find(x=>x.name===name);if(exists&&editingOldName!==name&&!confirm("同じ名前のデータがあります。上書きしますか？"))return;let obj={name,effect:val("f_effect"),description:val("f_description"),tags:normalizeTags(val("f_tags")),source:val("f_source")};if(mode==="effect")Object.assign(obj,{syndrome:val("f_syndrome"),timing:val("f_timing"),skill:val("f_skill"),level:val("f_level"),cost:val("f_cost")});if(mode==="item")Object.assign(obj,{category:val("f_category"),type:val("f_type"),skill:val("f_skill"),accuracy:val("f_accuracy"),attack:val("f_attack"),guard:val("f_guard"),range:val("f_range"),action:val("f_action"),armor:val("f_armor"),fullMove:val("f_fullMove"),purchase:val("f_purchase"),stock:val("f_stock"),exp:val("f_exp")});if(mode==="dlois")Object.assign(obj,{type:val("f_type"),timing:val("f_timing"),limit:val("f_limit")});if(editingOldName&&editingOldName!==name){await deleteOne(storeName(),editingOldName);arr=arr.filter(x=>x.name!==editingOldName)}arr=arr.filter(x=>x.name!==name);arr.push(obj);setCurrentData(arr);await putOne(storeName(),obj);csvStatus.textContent=`保存しました：${name}`;editingOldName=null;closeEditor();setupFilters();renderList();renderDetail(obj)}
async function deleteByName(name){if(!confirm(`「${name}」を削除しますか？`))return;let arr=getCurrentData().filter(x=>x.name!==name);setCurrentData(arr);await deleteOne(storeName(),name);csvStatus.textContent=`削除しました：${name}`;detail.classList.remove("show");setupFilters();renderList()}

function loadCSVFromInput(){const file=$("csvFile").files[0];if(!file){csvStatus.textContent="CSVファイルを選択してください";return}readCSVFile(file)}
function readCSVFile(file){const reader=new FileReader();reader.onload=async e=>{try{await ensureDB();let text=removeBOM(e.target.result);const rows=parseCSV(text);if(rows.length<2){csvStatus.textContent="CSVにデータがありません";return}const header=rows[0].map(h=>h.trim());let addEffect=0,addItem=0,addDlois=0,overwrite=0,skip=0;const newEffects=[],newItems=[],newDlois=[];for(let i=1;i<rows.length;i++){const obj={};header.forEach((h,idx)=>obj[h]=(rows[i][idx]||"").trim());if(!obj.name){skip++;continue}const kind=String(obj.kind||obj.dataType||obj.type||"").trim().toLowerCase();if(kind==="effect"){if(effects.find(e=>e.name===obj.name))overwrite++;else addEffect++;newEffects.push({name:obj.name,syndrome:obj.syndrome||"",timing:obj.timing||"",skill:obj.skill||"",level:obj.level||"",cost:obj.cost||"",effect:obj.effect||"",description:obj.description||"",source:obj.source||"",tags:normalizeTags(obj.tags||obj.effectType||"通常エフェクト")})}else if(kind==="item"){if(items.find(x=>x.name===obj.name))overwrite++;else addItem++;newItems.push({name:obj.name,category:obj.category||"",type:obj.type2||obj.itemType||obj.typeName||"",skill:obj.skill||"",accuracy:obj.accuracy||"",attack:obj.attack||"",guard:obj.guard||"",range:obj.range||"",action:obj.action||"",armor:obj.armor||"",fullMove:obj.fullMove||obj.fullmove||"",purchase:obj.purchase||"",stock:obj.stock||"",exp:obj.exp||"",effect:obj.effect||"",description:obj.description||"",source:obj.source||"",tags:normalizeTags(obj.tags||"")})}else if(kind==="dlois"){if(dloisList.find(x=>x.name===obj.name))overwrite++;else addDlois++;newDlois.push({name:obj.name,type:obj.dloisType||obj.type2||obj.category||"",timing:obj.timing||"",limit:obj.limit||"",effect:obj.effect||"",description:obj.description||"",source:obj.source||"",tags:normalizeTags(obj.tags||"")})}else skip++}
      if(newEffects.length){effects=mergeByName(effects,newEffects);await putMany("effects",newEffects)}
      if(newItems.length){items=mergeByName(items,newItems);await putMany("items",newItems)}
      if(newDlois.length){dloisList=mergeByName(dloisList,newDlois);await putMany("dlois",newDlois)}
      csvStatus.textContent=`読み込み成功：エフェクト${addEffect}件 / アイテム${addItem}件 / Dロイス${addDlois}件 / 上書き${overwrite}件 / スキップ${skip}件`;
      setupFilters();renderList()
    }catch(err){console.error(err);csvStatus.textContent="CSV読み込み失敗："+(err.message||err)}};reader.onerror=()=>csvStatus.textContent="ファイル読み込みに失敗しました";reader.readAsText(file,"UTF-8")}
function mergeByName(base,incoming){const map=new Map(base.map(x=>[x.name,x]));incoming.forEach(x=>map.set(x.name,x));return [...map.values()]}

async function removeDuplicates(){let total=0;for(const s of ["effects","items","dlois"]){let arr=s==="effects"?effects:s==="items"?items:dloisList;const before=arr.length;arr=mergeByName([],arr);total+=before-arr.length;await clearStore(s);await putMany(s,arr);if(s==="effects")effects=arr;if(s==="items")items=arr;if(s==="dlois")dloisList=arr}csvStatus.textContent=`重複削除完了：${total}件削除`;setupFilters();renderList()}
async function clearAllData(){if(!confirm("保存済みの全データを削除しますか？"))return;await clearStore("effects");await clearStore("items");await clearStore("dlois");effects=[];items=[];dloisList=[];csvStatus.textContent="全データを削除しました";setupFilters();renderList();detail.classList.remove("show");editor.classList.remove("show")}

function parseCSV(text){const rows=[];let row=[],cell="",quote=false;for(let i=0;i<text.length;i++){const c=text[i],n=text[i+1];if(c==='"'&&quote&&n==='"'){cell+='"';i++}else if(c==='"'){quote=!quote}else if(c===","&&!quote){row.push(cell);cell=""}else if((c==="\n"||c==="\r")&&!quote){if(c==="\r"&&n==="\n")i++;row.push(cell);if(row.some(v=>v.trim()!==""))rows.push(row);row=[];cell=""}else cell+=c}row.push(cell);if(row.some(v=>v.trim()!==""))rows.push(row);return rows}
function removeBOM(text){return String(text).replace(/^\uFEFF/,"")}
function downloadTemplate(type){let csv="";if(type==="effect")csv=`kind,name,syndrome,level,timing,skill,difficulty,target,range,cost,limit,effect,description,source,tags
effect,コンセントレイト：サンプル,エンジェルハイロゥ,1-3,メジャー,シンドローム,-,-,-,2,なし,"C値を-Lvする。下限値7。","多くの攻撃ビルドで使われる基本的なエフェクト。",基本ルールブック,通常エフェクト
effect,スポットライト,エンジェルハイロゥ,1,メジャー,-,自動成功,効果参照,視界,-,-,"演出用の光を作る。","演出やシーン補助に使いやすいイージーエフェクト。",基本ルールブック,イージーエフェクト`;if(type==="item")csv=`kind,name,category,type2,skill,accuracy,attack,guard,range,action,armor,fullMove,purchase,stock,exp,effect,description,source,tags
item,日本刀,武器,白兵,白兵,-1,5,3,至近,,,,11,5,,"攻撃力+5、ガード値3。","初期作成でも扱いやすい白兵武器。",基本ルールブック,武器
item,バイク,ヴィーグル,ヴィーグル,運転:二輪,0,5,,至近,0,5,250m,12,5,,"移動や戦闘に使えるヴィーグル。","ヴィーグル用の行動・装甲値・全力疾走を記録できる。",基本ルールブック,ヴィーグル`;if(type==="dlois")csv=`kind,name,dloisType,timing,limit,effect,description,source\ndlois,実験体,一般,常時,なし,"能力値を合計+4する。","能力値を底上げできる汎用性の高いDロイス。",基本ルールブック`;const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=type+"_template.csv";a.click();URL.revokeObjectURL(a.href)}

dropzone.addEventListener("dragover",e=>{e.preventDefault();dropzone.classList.add("drag")});dropzone.addEventListener("dragleave",()=>dropzone.classList.remove("drag"));dropzone.addEventListener("drop",e=>{e.preventDefault();dropzone.classList.remove("drag");const file=e.dataTransfer.files[0];if(!file){csvStatus.textContent="ファイルが見つかりません";return}readCSVFile(file)});
function updateExpFilterVisibility(){
  const row = document.getElementById("expFilterRow");
  if(!row) return;
  row.style.display = mode === "item" ? "flex" : "none";
}

function parseNumber(value){
  const s = String(value ?? "").replace(/[０-９]/g, function(c){
    return String.fromCharCode(c.charCodeAt(0) - 0xFEE0);
  });
  const m = s.match(/-?[0-9]+(\.[0-9]+)?/);
  return m ? Number(m[0]) : NaN;
}
function shortText(str, max=80){const s=String(str??"").trim();return s.length>max?s.slice(0,max)+"…":s}
function normalizeTags(str){return String(str??"").split(/[、,]/).map(t=>t.trim()).filter(Boolean).join(",")}
function normalizeTagName(tag){
  return String(tag ?? "")
    .trim()
    .replace(/^[-－#＃]+/, "")
    .trim();
}

function parseSearchQuery(raw){
  const parts = String(raw || "").split(/\s+/).filter(Boolean);
  const normalParts = [];
  const minusTags = [];

  parts.forEach(function(p){
    if((p.startsWith("-") || p.startsWith("－")) && p.length > 1){
      const tag = normalizeTagName(p);
      if(tag) minusTags.push(tag);
    }else{
      normalParts.push(p);
    }
  });

  return {
    normal: normalParts.join(" "),
    minusTags: minusTags
  };
}
function getAllTags(){return unique([...effects,...items,...dloisList].flatMap(d=>normalizeTags(d.tags).split(",").filter(Boolean)))}
function renderTagFilterBox(){
  const box = document.getElementById("tagFilterBox");
  if(!box) return;

  const tags = getAllTags();
  if(!tags.length){
    box.innerHTML = "タグ絞り込み：タグ未登録";
    return;
  }

  box.innerHTML = `
    <b>タグ絞り込み：</b>

    <div class="row" style="margin-top:6px">
      <input id="tagIncludeInput" list="tagFilterSuggestList" placeholder="含めるタグを選択">
      <input id="tagExcludeInput" list="tagFilterSuggestList" placeholder="除外するタグを選択">
      <datalist id="tagFilterSuggestList">
        ${tags.map(t => `<option value="${escapeAttr(t)}"></option>`).join("")}
      </datalist>
    </div>

    <div class="row">
      <button type="button" class="btn small main" onclick="addIncludeTag()">含めるタグ追加</button>
      <button type="button" class="btn small warn" onclick="addExcludeTag()">除外タグ追加</button>
      <button type="button" class="btn small" onclick="clearTagFilters()">タグ選択解除</button>
    </div>

    <div style="margin-top:6px">
      <b>含める：</b>${renderSelectedTagFilters()}
    </div>

    <div style="margin-top:6px">
      <b>除外：</b>${renderExcludedTagFilters()}
    </div>
  `;
}
function addIncludeTag(){
  const input = document.getElementById("tagIncludeInput");
  if(!input) return;

  const tag = input.value.trim();
  if(!tag) return;

  if(!selectedFilterTags.includes(tag)){
    selectedFilterTags.push(tag);
  }

  input.value = "";
  renderTagFilterBox();
  renderList();
}

function addExcludeTag(){
  const input = document.getElementById("tagExcludeInput");
  if(!input) return;

  const tag = input.value.trim();
  if(!tag) return;

  if(!excludedFilterTags.includes(tag)){
    excludedFilterTags.push(tag);
  }

  input.value = "";
  renderTagFilterBox();
  renderList();
}

function renderExcludedTagFilters(){
  if(!excludedFilterTags.length){
    return `<span class="small">なし</span>`;
  }

  return excludedFilterTags
    .map(t => `<button type="button" class="btn small warn" onclick="removeExcludeTag('${escapeJS(t)}')">-${escapeHTML(t)} ×</button>`)
    .join(" ");
}

function removeExcludeTag(tag){
  excludedFilterTags = excludedFilterTags.filter(t => t !== tag);
  renderTagFilterBox();
  renderList();
}
function tagFilterKey(event){
  if(event.key==="Enter"){
    event.preventDefault();
    addTagFilterFromInput();
  }
}
function addTagFilterFromInput(){
  const input=document.getElementById("tagFilterInput");
  if(!input)return;
  const tag=input.value.trim();
  if(!tag)return;
  if(!selectedFilterTags.includes(tag))selectedFilterTags.push(tag);
  input.value="";
  renderTagFilterBox();
  renderList();
}
function removeTagFilter(tag){
  selectedFilterTags=selectedFilterTags.filter(t=>t!==tag);
  renderTagFilterBox();
  renderList();
}
function renderSelectedTagFilters(){
  if(!selectedFilterTags.length)return `<span class="small">タグ未選択</span>`;
  return selectedFilterTags.map(t=>`<button type="button" class="btn small" onclick="removeTagFilter('${escapeJS(t)}')">#${escapeHTML(t)} ×</button>`).join(" ");
}
function getSelectedTagFilters(){return selectedFilterTags}
function getExcludedTagFilters(){return excludedFilterTags}
function clearTagFilters(){
  selectedFilterTags = [];
  excludedFilterTags = [];
  renderTagFilterBox();
  renderList();
}
function tagOptionsHTML(){return getAllTags().map(t=>`<option value="${escapeAttr(t)}"></option>`).join("")}
function tagChipsHTML(){const tags=getAllTags();if(!tags.length)return "まだタグがありません";return tags.map(t=>`<button type="button" class="btn small" onclick="addTagToEditor('${escapeJS(t)}')">#${escapeHTML(t)}</button>`).join(" ")}
function addTagToEditor(tag){const input=document.getElementById("f_tags");if(!input)return;const current=normalizeTags(input.value).split(",").filter(Boolean);if(!current.includes(tag))current.push(tag);input.value=current.join(",")}
function setEffectTypeTag(typeTag){const input=document.getElementById("f_tags");if(!input)return;let current=normalizeTags(input.value).split(",").filter(Boolean);current=current.filter(t=>t!=="通常エフェクト"&&t!=="イージーエフェクト");current.unshift(typeTag);input.value=current.join(",")}
function renderUserTags(str){return normalizeTags(str).split(",").filter(Boolean).map(t=>`<span class="userTag">#${escapeHTML(t)}</span>`).join("")}
function escapeHTML(str){return String(str??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#39;")}
function escapeAttr(str){return escapeHTML(str)}
function escapeJS(str){return String(str??"").replace(/\\/g,"\\\\").replace(/'/g,"\\'").replace(/\n/g,"\\n").replace(/\r/g,"")}

$("filePanel").classList.add("hidden");
$("dropzone").classList.add("hidden");
setupFilters();renderList()

init();
